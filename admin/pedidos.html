<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedidos</title>

<link rel="stylesheet" href="/admin/css/pedidos.css">

</head>


<body>


<div class="container">


    <div class="topo-pedidos">


        <h1>
            Área de Pedidos
        </h1>


        <a href="painel.html" class="btn-voltar">
            ← Voltar ao Painel
        </a>


    </div>



    <section class="pedidos-container">


        <div class="pedido">


            <h2>
                Pedido #001
            </h2>


            <p>
                <strong>Cliente:</strong>
                João Silva
            </p>


            <p>
                <strong>Telefone:</strong>
                (75) 99999-9999
            </p>


            <p>
                <strong>Produtos:</strong>
                Arroz 5kg, Feijão 1kg
            </p>


            <p>
                <strong>Total:</strong>
                R$ 75,00
            </p>


            <label>
                Status:
            </label>


            <select>

                <option>
                    Novo
                </option>

                <option>
                    Em análise
                </option>

                <option>
                    Enviado
                </option>

                <option>
                    Finalizado
                </option>


            </select>


        </div>



    </section>



</div>


<script src="Js/pedidos.js"></script>


</body>

</html>
