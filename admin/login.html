<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Admin</title>

    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="/fronteemd/css/layout/responsive.css">

</head>


<body>


<div class="container">


    <h1>
        Login Administrativo
    </h1>


    <form id="loginForm">


        <div class="form-group">

            <label>
                Usuário
            </label>

            <input 
                type="text" 
                id="usuario"
                required
            >

        </div>



        <div class="form-group">

            <label>
                Senha
            </label>

            <input 
                type="password"
                id="senha"
                required
            >

        </div>



        <button type="submit">
            Entrar
        </button>


    </form>


</div>



<script src="./js/login.js"></script>


</body>

</html>
